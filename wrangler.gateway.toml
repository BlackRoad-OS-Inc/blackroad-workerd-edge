# BlackRoad OS — AI Gateway Worker (Cloudflare Workers cloud deployment)
# Used for longer-running AI proxy tasks (Claude, OpenAI)
# Deploy: npx wrangler deploy -c wrangler.gateway.toml

name = "blackroad-gateway"
main = "workers/gateway.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Workers Observability
[observability]
enabled = true

[env.production]
name = "blackroad-gateway-prod"
# Secrets are set via: npx wrangler secret put ANTHROPIC_API_KEY -c wrangler.gateway.toml
# Required secrets (optional — set the ones you use):
#   ANTHROPIC_API_KEY   — sk-ant-...
#   OPENAI_API_KEY      — sk-...

[env.staging]
name = "blackroad-gateway-staging"
