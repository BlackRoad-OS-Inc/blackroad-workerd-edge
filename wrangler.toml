# BlackRoad OS — Stripe Worker (Cloudflare Workers cloud deployment)
# Used for production Stripe billing and webhook handling
# Deploy: npx wrangler deploy

name = "blackroad-stripe"
main = "workers/stripe.js"
compatibility_date = "2024-12-01"
compatibility_flags = []

# Workers Observability
[observability]
enabled = true

[env.production]
name = "blackroad-stripe-prod"
# Secrets are set via: npx wrangler secret put STRIPE_SECRET_KEY
# Required secrets:
#   STRIPE_SECRET_KEY        — sk_live_...
#   STRIPE_WEBHOOK_SECRET    — whsec_...
#   ALLOWED_ORIGIN           — https://blackroad-brand-kit.pages.dev

[env.staging]
name = "blackroad-stripe-staging"
vars = { ALLOWED_ORIGIN = "https://blackroad-brand-kit.pages.dev" }
