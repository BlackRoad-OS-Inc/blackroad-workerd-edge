# BlackRoad OS — Deploy
# Deploys to Pi and/or DigitalOcean on push to main.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'both'
        type: choice
        options:
          - pi
          - do
          - both

permissions:
  contents: read

jobs:
  deploy-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'pi' ||
      github.event.inputs.target == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /opt/blackroad-workerd
            git pull origin main
            sudo systemctl restart blackroad-workerd

  deploy-do:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'do' ||
      github.event.inputs.target == 'both'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/blackroad-workerd
            git pull origin main
            systemctl restart blackroad-workerd
